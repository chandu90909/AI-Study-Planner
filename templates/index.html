<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Planner</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 8px rgba(79,172,254,0.5);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .success {
            margin-top: 20px;
            color: green;
            font-weight: 500;
            background: #e6ffe6;
            padding: 10px;
            border-radius: 8px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>📘 AI Study Planner</h1>

    <form method="POST">
        <div class="input-group">
            <label>Course</label>
            <input type="text" name="course" placeholder="e.g. DSA" required>
        </div>

        <div class="input-group">
            <label>Weeks</label>
            <input type="number" name="weeks" placeholder="e.g. 2" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com" required>
        </div>

        <button type="submit">🚀 Generate Plan</button>
    </form>

    {% if message %}
        <div class="success">{{ message }}</div>
    {% endif %}

    <div class="footer">
        Powered by AI + Google Calendar
    </div>
</div>

</body>
</html>
